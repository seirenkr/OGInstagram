<!doctype html>
<html lang="{{LANG}}" data-mode="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{BRAND}}</title>
  <meta name="description" content="{{T_TAGLINE}}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{BRAND}}">
  <meta property="og:title" content="{{BRAND}}">
  <meta property="og:description" content="{{T_TAGLINE}}">
  <meta property="twitter:card" content="summary">
  <meta property="twitter:title" content="{{BRAND}}">
  <meta property="twitter:description" content="{{T_TAGLINE}}">
  {{HEAD_LINKS}}
  <link rel="icon" href="/favicon-192.png" sizes="192x192" type="image/png">
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-jp-dynamic-subset.min.css">
  <link rel="stylesheet" href="{{MAIN_CSS}}">
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      var dark = saved ? saved === "dark" : matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.dataset.mode = dark ? "dark" : "light";
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script id="app-data" type="application/json">{{APP_JSON}}</script>
  <script type="module" src="{{MAIN_JS}}"></script>
</body>
</html>
